<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盤面色数解析ツール</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #preview-canvas { max-width: 100%; border: 1px solid #333; margin-top: 10px; }
        .result-area { margin-top: 20px; text-align: left; background: #eee; padding: 15px; border-radius: 5px; word-break: break-all; font-family: monospace; max-height: 200px; overflow-y: auto; }
        .btn { background-color: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 行ごとの色数解析</h1>
    <input type="file" id="file-input" accept="image/*" style="display: none;">
    <button class="btn" onclick="document.getElementById('file-input').click()">画像を選択して解析</button>
    
    <canvas id="preview-canvas"></canvas>
    
    <h3>解析結果 (行ごとのユニーク色数):</h3>
    <div id="result-box" class="result-area">画像を選択するとここに結果が表示されます</div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');
    const resultBox = document.getElementById('result-box');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                // 解析実行
                analyzeColorCount();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function analyzeColorCount() {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const width = canvas.width;
        const height = canvas.height;
        
        let rowColorCounts = [];

        for (let y = 0; y < height; y++) {
            let uniqueColors = new Set();
            
            for (let x = 0; x < width; x++) {
                const index = (y * width + x) * 4;
                const r = data[index];
                const g = data[index + 1];
                const b = data[index + 2];

                // 🚀 工学的工夫：色の量子化 (各チャンネルの下位4bitを捨てる)
                // 直撮り写真のノイズを無視し、本質的な色数を数えるため
                const quantizedColor = `${r >> 4},${g >> 4},${b >> 4}`;
                uniqueColors.add(quantizedColor);
            }
            rowColorCounts.push(uniqueColors.size);
        }

        // カンマ区切りで表示
        resultBox.innerText = rowColorCounts.join(', ');
        console.log("Analysis complete. Total rows:", rowColorCounts.length);
    }
</script>

</body>
</html>
