<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>盤面境界検知プロファイラー (BEデバッグ強化版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; }
        
        .btn { background-color: #3498db; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin: 20px 0; transition: background 0.3s; }
        .btn:hover { background-color: #2980b9; }

        .stage-area { display: flex; align-items: stretch; margin-top: 10px; border: 1px solid #333; background-color: #fff; }
        .y-scale { display: flex; flex-direction: column; width: 60px; justify-content: space-between; border-right: 2px solid #333; font-family: monospace; font-size: 12px; text-align: right; background: #eee; }
        .y-scale div { height: 0; position: relative; }
        .y-scale div::after { content: ""; position: absolute; right: 0; top: 0; width: 10px; height: 1px; background: #333; }
        .tick-label { position: absolute; right: 12px; top: -7px; font-weight: bold; }

        #preview-canvas { max-width: 800px; height: auto; }
        
        /* 🚀 デバッグエリアを2段並列にするためのレイアウト */
        .results-wrapper { display: flex; gap: 20px; width: 100%; margin-top: 20px; box-sizing: border-box; }
        .result-area { flex: 1; text-align: left; background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 5px; box-sizing: border-box; }
        .result-box { font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; max-height: 450px; overflow-y: auto; background: #1a252f; padding: 10px; border-radius: 4px; border: 1px solid #34495e; }
        
        .header-label { color: #f1c40f; font-weight: bold; margin-bottom: 8px; display: block; font-size: 14px; }
        
        .drag-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(52, 152, 219, 0.9); z-index: 1000; justify-content: center; align-items: center; pointer-events: none; }
        .drag-overlay-text { font-size: 30px; color: white; font-weight: bold; }
        body.drag-active .drag-overlay { display: flex; }
    </style>
</head>
<body id="drop-target">

<div id="dragOverlay" class="drag-overlay">
    <div class="drag-overlay-text">ドロップして解析</div>
</div>

<div class="container">
    <h1>🔍 盤面境界検知・画像物理カット版</h1>
    <p>50%より下を考え、40以下が3連して70以上が出たら、それより上をカット</p>
    
    <input type="file" id="file-input" accept="image/*" style="display: none;">
    <button class="btn" onclick="document.getElementById('file-input').click()">写真を選択して解析</button>
    
    <div id="detection-msg"></div>
    
    <div id="stage" class="stage-area" style="display: none;">
        <div id="y-scale-ticks" class="y-scale"></div>
        <canvas id="preview-canvas"></canvas>
    </div>
    
    <div class="results-wrapper">
        <div class="result-area">
            <span class="header-label">🎨 ① 盤面色判定結果 (シミュレータ同期用)</span>
            <div id="result-box-color" class="result-box">画像を選択すると色情報が表示されます</div>
        </div>
        <div class="result-area">
            <span class="header-label">⚡ ② ボーナスエリア解析ログ (フチの平均RGB値)</span>
            <div id="result-box-be" class="result-box">画像を選択するとBE解析データが表示されます</div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');
    const resultBoxColor = document.getElementById('result-box-color');
    const resultBoxBe = document.getElementById('result-box-be');
    const stageArea = document.getElementById('stage');
    const yScaleTicks = document.getElementById('y-scale-ticks');

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleImage(e.target.files[0]);
    });

    function handleImage(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() { analyzeAndCut(img); };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function generateYScale(height) {
        yScaleTicks.innerHTML = '';
        for (let i = 0; i <= 20; i++) {
            const div = document.createElement('div');
            const label = document.createElement('span');
            label.className = 'tick-label';
            label.innerText = `${i * 5}%`;
            div.appendChild(label);
            yScaleTicks.appendChild(div);
        }
    }

  function analyzeAndCut(img) {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = img.width;
    tempCanvas.height = img.height;
    const tempCtx = tempCanvas.getContext('2d', {willReadFrequently: true});
    tempCtx.drawImage(img, 0, 0);

    const imageData = tempCtx.getImageData(0, 0, img.width, img.height);
    const data = imageData.data;
    const width = img.width;
    const height = img.height;
    
    // --- 1. 垂直・水平の境界検知 ---
    let allRowCounts = [];
    for (let y = 0; y < height; y++) {
        let unique = new Set();
        for (let x = 0; x < width; x++) {
            const i = (y * width + x) * 4;
            unique.add((data[i] << 16) | (data[i+1] << 8) | (data[i+2]));
        }
        allRowCounts.push(unique.size);
    }

    let topCutY = 0, bottomCutY = height, foundPlateau = false;
    let lowCountRows = 0;
    const scanStartY = Math.floor(height * 0.5), limitY = Math.floor(height * 0.8); 
    for (let y = scanStartY; y < height; y++) {
        if (!foundPlateau) {
            if (allRowCounts[y] <= 40) { lowCountRows++; if (lowCountRows >= 3) foundPlateau = true; }
            else lowCountRows = 0;
        } else if (topCutY === 0) {
            if (allRowCounts[y] >= 70) topCutY = y;
        }
        if (y >= limitY && allRowCounts[y] <= 40) { bottomCutY = y; break; }
    }

    const finalHeight = bottomCutY - topCutY;
    const aTop = Math.floor(topCutY + finalHeight * 0.25), aBottom = Math.floor(bottomCutY - finalHeight * 0.25);
    let colCounts = [];
    for (let x = 0; x < width; x++) {
        let u = new Set();
        for (let y = aTop; y < aBottom; y++) {
            const i = (y * width + x) * 4;
            u.add((data[i] << 16) | (data[i+1] << 8) | (data[i+2]));
        }
        colCounts.push(u.size);
    }
    let leftX = 0, fGap = false, lLow = 0;
    for (let x = 0; x < width; x++) {
        if (!fGap) { if (colCounts[x] <= 10) { lLow++; if (lLow >= 3) fGap = true; } else lLow = 0; }
        else { if (colCounts[x] >= 40) { leftX = x; break; } }
    }
    let rightX = width, rLow = 0;
    for (let x = Math.floor(width * 0.7); x < width; x++) {
        if (colCounts[x] <= 10) { rLow++; if (rLow >= 3) { rightX = x - 1; break; } } else rLow = 0;
    }

    const finalWidth = rightX - leftX;
    canvas.width = finalWidth; canvas.height = finalHeight;
    ctx.drawImage(img, leftX, topCutY, finalWidth, finalHeight, 0, 0, finalWidth, finalHeight);

    // --- 2. 色判定リファレンス ---
    const COLOR_PALETTE = {
        "赤": { r: 210, g: 50,  b: 50 },
        "青": { r: 50,  g: 100, b: 210 },
        "緑": { r: 50,  g: 160, b: 50 },
        "黄": { r: 220, g: 200, b: 50 },
        "紫": { r: 150, g: 50,  b: 180 }
    };

    const yRatios = [1, 2, 2, 2, 2, 2, 2];
    const uH = finalHeight / 13, uW = finalWidth / 8;
    
    let colorOutputText = "";
    let beOutputText = "";
    let currentLoopY = 0;

    for (let row = 0; row < 7; row++) {
        const rowHeight = yRatios[row] * uH;
        let rowColors = [];
        let rowBes = [];

        for (let col = 0; col < 8; col++) {
            let sX, eX, sY, eY;
            const cellLeft = leftX + (col * uW);
            const cellRight = leftX + ((col + 1) * uW);
            const cellTop = topCutY + currentLoopY;
            const cellBottom = topCutY + currentLoopY + rowHeight;

            if (row === 0) {
                sX = cellLeft + (uW * 0.33); eX = cellLeft + (uW * 0.48);
                sY = cellTop + (rowHeight * 0.33); eY = cellTop + (rowHeight * 0.55);
            } else {
                sX = cellLeft + (uW * 0.25); eX = cellLeft + (uW * 0.75);
                sY = cellTop + (rowHeight * 0.25); eY = cellTop + (rowHeight * 0.75);
            }

            // --- 💡 🚀 強化版ボーナスエリア（半透明黄色枠）の検知ロジック ---
            let isBonusArea = 0;
            let debugBeggR = 0, debugBeggG = 0, debugBeggB = 0;
            
            if (row > 0) { 
                let borderSumR = 0, borderSumG = 0, borderSumB = 0, borderCount = 0;
                const offsetIn = 4; // マスの内側フチ4pxの地点を狙う
                
                const samplePoints = [
                    { x: cellLeft + offsetIn,  y: cellTop + offsetIn },
                    { x: cellRight - offsetIn, y: cellTop + offsetIn },
                    { x: cellLeft + offsetIn,  y: cellBottom - offsetIn },
                    { x: cellRight - offsetIn, y: cellBottom - offsetIn }
                ];

                samplePoints.forEach(pt => {
                    const px = Math.floor(pt.x);
                    const py = Math.floor(pt.y);
                    if (px >= 0 && px < width && py >= 0 && py < height) {
                        const idx = (py * width + px) * 4;
                        borderSumR += data[idx];
                        borderSumG += data[idx+1];
                        borderSumB += data[idx+2];
                        borderCount++;
                    }
                });

                if (borderCount > 0) {
                    debugBeggR = Math.floor(borderSumR / borderCount);
                    debugBeggG = Math.floor(borderSumG / borderCount);
                    debugBeggB = Math.floor(borderSumB / borderCount);
                    
                    // 💡 【判定アルゴリズムの修正】不透明シールドを外し、相対色差（半透明）で検知
                    // 黄色の特性（RとGがほぼ同じ強さで、かつBよりも圧倒的に強い）を差分で検出
                    const yellowThreshold = 35; // R,G成分がB成分よりどれだけ突出しているか
                    if (debugBeggR > 130 && debugBeggG > 130 && (debugBeggR - debugBeggB > yellowThreshold) && (debugBeggG - debugBeggB > yellowThreshold)) {
                        isBonusArea = 1;
                    }
                }
            }

            // --- 通常のぷよ色判定 ---
            let sumR = 0, sumG = 0, sumB = 0, count = 0;
            let uniqueInCell = new Set();

            for (let py = Math.floor(sY); py < Math.floor(eY); py++) {
                for (let px = Math.floor(sX); px < Math.floor(eX); px++) {
                    const i = (py * width + px) * 4;
                    const r = data[i], g = data[i+1], b = data[i+2];
                    uniqueInCell.add((r << 16) | (g << 8) | b);

                    if (r > 240 && g > 240 && b > 240) continue;
                    sumR += r; sumG += g; sumB += b; count++;
                }
            }
            if (count === 0) {
                const mi = (Math.floor((sY+eY)/2)*width + Math.floor((sX+eX)/2))*4;
                sumR = data[mi]; sumG = data[mi+1]; sumB = data[mi+2]; count = 1;
            }
            const avg = { r: sumR / count, g: sumG / count, b: sumB / count };
            let closestColor = "不明";

            if (row !== 0 && uniqueInCell.size <= 300) {
                if (avg.g >= avg.r * 0.86) { closestColor = "黄"; } 
                else { closestColor = "ピンク"; }
            } else {
                let minDest = Infinity;
                for (let colorName in COLOR_PALETTE) {
                    const t = COLOR_PALETTE[colorName];
                    const d = Math.sqrt(Math.pow(avg.r-t.r,2)+Math.pow(avg.g-t.g,2)+Math.pow(avg.b-t.b,2));
                    if (d < minDest) { minDest = d; closestColor = colorName; }
                }
            }
            
            // 左右のデバッグ文字列を生成
            rowColors.push(`${closestColor}(${uniqueInCell.size})`);
            
            if (row === 0) {
                rowBes.push(`NEXT(判定対象外)`);
            } else {
                // 🚀 平均値のRGB（R, G, B）とBE判定結果を可視化
                rowBes.push(`[BE:${isBonusArea}](${debugBeggR},${debugBeggG},${debugBeggB})`);
            }
        }
        
        const label = row === 0 ? "NEXT " : `ROW${row} `;
        colorOutputText += `${label}: [ ${rowColors.join(", ")} ]\n`;
        beOutputText += `${label}: [ ${rowBes.join(" | ")} ]\n`;
        
        currentLoopY += rowHeight;
    }

    stageArea.style.display = 'flex'; generateYScale(finalHeight);
    resultBoxColor.innerHTML = colorOutputText;
    resultBoxBe.innerHTML = beOutputText;
}

    // ドラッグ&ドロップ
    document.addEventListener('dragover', (e) => {
        e.preventDefault(); document.body.classList.add('drag-active');
    });
    document.addEventListener('dragleave', (e) => {
        if (e.relatedTarget === null || !document.body.contains(e.relatedTarget)) {
            document.body.classList.remove('drag-active');
        }
    });
    document.addEventListener('drop', (e) => {
        e.preventDefault(); document.body.classList.remove('drag-active');
        if (e.dataTransfer.files.length > 0) handleImage(e.dataTransfer.files[0]);
    });
</script>

</body>
</html>
